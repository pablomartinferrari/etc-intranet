services:
  postgres:
    image: postgres:16-alpine
    container_name: intranet-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: intranet
      POSTGRES_USER: intranet
      POSTGRES_PASSWORD: intranet_dev_password
    volumes:
      - intranet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intranet -d intranet"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  intranet_pgdata:
